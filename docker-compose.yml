version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: tattoo_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: tattoostudio
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./Scripts:/docker-entrypoint-initdb.d
    restart: unless-stopped

  api:
    build: .
    container_name: tattoo_api
    ports:
      - "5000:80"
      - "5001:443"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=tattoostudio;Username=postgres;Password=admin
    depends_on:
      - postgres
    restart: unless-stopped

volumes:
  postgres_data: